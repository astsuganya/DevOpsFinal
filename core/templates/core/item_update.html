{% extends 'base.html' %}
{% load bootstrap5 %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-12">
        <div class="surface-card form-panel">
            <div class="card-body p-4">
                <h2 class="page-title mb-4">Edit Item</h2>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-4">
                        <!-- Left Column: Image Upload -->
                        <div class="col-lg-4">
                            <div class="mb-3">
                                <label for="image" class="form-label fw-bold d-block mb-3">Image Attachment</label>
                                <div class="image-upload-area" onclick="document.getElementById('image').click()">
                                    <input class="form-control" type="file" id="image" name="image" accept="image/*" style="display: none;">
                                    <div id="image-preview" class="mt-3">
                                        {% if item.image %}
                                        <img src="{{ item.image.url }}" alt="Current image" style="max-height: 200px; object-fit: cover; border-radius: 8px;">
                                        {% endif %}
                                    </div>
                                    <div class="mt-3 text-center text-muted small">
                                        <p>Click to change image</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Right Column: Form Fields -->
                        <div class="col-lg-8">
                            <div class="mb-3">
                                <label for="title" class="form-label fw-bold">What is it?</label>
                                <input type="text" class="form-control" id="title" name="title" value="{{ item.title }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="status" class="form-label fw-bold">Status</label>
                                <select class="form-select" id="status" name="status" required>
                                    <option value="Lost" {% if item.status == 'Lost' %}selected{% endif %}>I lost something</option>
                                    <option value="Found" {% if item.status == 'Found' %}selected{% endif %}>I found something</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="location" class="form-label fw-bold">Location</label>
                                <input type="text" class="form-control" id="location" name="location" value="{{ item.location }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label fw-bold">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="4" required>{{ item.description }}</textarea>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Buttons -->
                    <div class="row g-2 mt-2">
                        <div class="col-lg-8 offset-lg-4">
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <a href="{% url 'core:item_detail' item.pk %}" class="btn btn-light">Cancel</a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('image').addEventListener('change', function(event) {
    const file = event.target.files[0];
    const previewDiv = document.getElementById('image-preview');
    
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            previewDiv.innerHTML = '<img src="' + e.target.result + '" alt="Image preview" style="max-height: 200px; object-fit: cover; border-radius: 8px;">';
        };
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
