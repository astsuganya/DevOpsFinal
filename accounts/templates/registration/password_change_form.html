{% extends 'base.html' %}
{% load bootstrap5 %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7 col-lg-6">
        <div class="surface-card auth-panel">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 fw-bold">Change Password</h3>
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Update Password</button>
                </form>
                <div class="mt-4 text-center text-muted small">
                    <a href="{% url 'accounts:profile' %}" class="fw-bold">Back to profile</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
